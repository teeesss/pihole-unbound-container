name: Update Checker

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ── Helper: curl with retries ────────────────────────────────────────────
          fetch_url() {
            local url="$1"
            local headers=("${@:2}")
            local curl_cmd=(curl -sf --connect-timeout 10 --retry 3 --retry-delay 5)
            
            for h in "${headers[@]}"; do
              curl_cmd+=(-H "$h")
            done
            
            "${curl_cmd[@]}" "$url"
          }

          # ── Helper: fetch from GitHub Releases ───────────────────────────────────
          get_github_release() {
            local repo="$1"
            local field="$2"
            local response
            
            response=$(fetch_url "https://api.github.com/repos/${repo}/releases" \
              "Authorization: Bearer ${GH_TOKEN}" \
              "Accept: application/vnd.github+json" \
              "X-GitHub-Api-Version: 2022-11-28") || return 1

            if ! echo "$response" | jq -e 'type == "array"' > /dev/null 2>&1; then
              return 1
            fi

            # 4-Layer stable-only filter
            echo "$response" | jq -r '
              map(select(
                .prerelease==false and
                .draft==false and
                (.tag_name | test("(?i)(alpha|beta|canary|debug|dev|devel|development|edge|experimental|insiders|next|nightly|pre[.\\-]|preview|rc|rh|snapshot|temp|test|tmp|unstable)") | not) and
                (.tag_name | test("^(v?\\d+([.\\-]\\d+)*|release-\\d+(\\.\\d+)*)$"))
              )) | .[0].'"${field}"' // ""'
          }

          # ── Fallback: fetch from Docker Hub (for Pi-hole) ────────────────────────
          get_dockerhub_tag() {
            local repo="$1"
            local response
            
            response=$(fetch_url "https://registry.hub.docker.com/v2/repositories/${repo}/tags?page_size=50") || return 1
            
            # Extract tags that match our stable allowlist, exclude known junk, sort and take latest
            echo "$response" | jq -r '
              .results[].name | 
              select(
                test("^(v?\\d+([.\\-]\\d+)*)$") and 
                (test("(?i)(alpha|beta|canary|debug|dev|devel|development|edge|experimental|insiders|next|nightly|pre[.\\-]|preview|rc|rh|snapshot|temp|test|tmp|unstable)") | not)
              )' | sort -V | tail -n1
          }

          # ── Helper: Downgrade Guard ──────────────────────────────────────────────
          is_downgrade() {
            local current="$1"
            local new="$2"
            [ "$(echo -e "$current\n$new" | sort -V | head -n1)" == "$new" ] && [ "$current" != "$new" ]
          }

          # ── Execution ────────────────────────────────────────────────────────────
          
          # 1. Resolve Pi-hole
          PI_VERSION=$(get_github_release "pi-hole/docker-pi-hole" "tag_name" || get_dockerhub_tag "pihole/pihole")
          PI_DATE=$(get_github_release "pi-hole/docker-pi-hole" "published_at" || date -u +%Y-%m-%dT%H:%M:%SZ) # fallback to now if date missing
          
          # 2. Resolve Unbound
          UNBOUND_VERSION=$(get_github_release "NLnetLabs/unbound" "tag_name" || echo "")
          UNBOUND_DATE=$(get_github_release "NLnetLabs/unbound" "published_at" || date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "Pi-hole candidate  : ${PI_VERSION:-<unknown>} (${PI_DATE:-?})"
          echo "Unbound candidate  : ${UNBOUND_VERSION:-<unknown>} (${UNBOUND_DATE:-?})"

          # Check against current
          CURR_PI=$(grep PIHOLE_VERSION VERSION | cut -d'=' -f2 || echo "0.0.0")
          CURR_UNBOUND=$(grep UNBOUND_VERSION VERSION | cut -d'=' -f2 || echo "0.0.0")

          # Bail if resolution failed
          if [ -z "$PI_VERSION" ] || [ -z "$UNBOUND_VERSION" ]; then
            echo "::warning::Resolution failed; skipping."
            echo "stable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Downgrade guard
          if is_downgrade "$CURR_PI" "$PI_VERSION"; then
            echo "::warning::Pi-hole resolved to an older version ($PI_VERSION < $CURR_PI); guarding against downgrade."
            PI_VERSION="$CURR_PI"
          fi
          if is_downgrade "$CURR_UNBOUND" "$UNBOUND_VERSION"; then
            echo "::warning::Unbound resolved to an older version ($UNBOUND_VERSION < $CURR_UNBOUND); guarding against downgrade."
            UNBOUND_VERSION="$CURR_UNBOUND"
          fi

          # 3-Day Buffer check
          THRESHOLD=259200
          NOW=$(date -u +%s)

          PI_STABLE=true
          if [ "$PI_VERSION" != "$CURR_PI" ]; then
            PI_AGE=$(( NOW - $(date -d "$PI_DATE" +%s 2>/dev/null || echo "$NOW") ))
            if [ "$PI_AGE" -lt "$THRESHOLD" ]; then
              PI_STABLE=false
              echo "::notice::Pi-hole version $PI_VERSION is too new (age $((PI_AGE/3600))h < 72h)"
            fi
          fi

          UNBOUND_STABLE=true
          if [ "$UNBOUND_VERSION" != "$CURR_UNBOUND" ]; then
            UNBOUND_AGE=$(( NOW - $(date -d "$UNBOUND_DATE" +%s 2>/dev/null || echo "$NOW") ))
            if [ "$UNBOUND_AGE" -lt "$THRESHOLD" ]; then
              UNBOUND_STABLE=false
              echo "::notice::Unbound version $UNBOUND_VERSION is too new (age $((UNBOUND_AGE/3600))h < 72h)"
            fi
          fi

          echo "latest_pi=$PI_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_unbound=$UNBOUND_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PI_STABLE" = "true" ] && [ "$UNBOUND_STABLE" = "true" ]; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Version File
        if: steps.check.outputs.stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PI_VER="${{ steps.check.outputs.latest_pi }}"
          UNBOUND_VER="${{ steps.check.outputs.latest_unbound }}"
          echo "PIHOLE_VERSION=$PI_VER" > VERSION
          echo "UNBOUND_VERSION=$UNBOUND_VER" >> VERSION

          if git diff --quiet; then
            echo "Versions are already current."
          else
            UNBOUND_VER_CLEAN=$(echo "$UNBOUND_VER" | sed 's/^release-//')
            TAG_NAME="${PI_VER}-${UNBOUND_VER_CLEAN}"

            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add VERSION
            git commit -m "chore: update upstream versions to Pi-hole $PI_VER and Unbound $UNBOUND_VER"
            git push

            # Create and push Git Tag
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"

            # Create GitHub Release with direct upstream release links
            RELEASE_NOTES="### Upstream Release Information

- **Pi-hole (docker-pi-hole)**: [Release $PI_VER](https://github.com/pi-hole/docker-pi-hole/releases/tag/$PI_VER)
- **Unbound**: [Release $UNBOUND_VER](https://github.com/NLnetLabs/unbound/releases/tag/$UNBOUND_VER)"

            gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "$RELEASE_NOTES"
          fi
