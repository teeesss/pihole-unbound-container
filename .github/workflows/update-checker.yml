name: Update Checker

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Upstream Versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ── Helper: fetch releases with auth, validate array, extract fields ──────
          fetch_release() {
            local repo="$1"
            local field="$2"
            local response

            response=$(curl -sf \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/releases" 2>&1) || {
              echo "::warning::curl failed for ${repo} (network error)" >&2
              echo ""
              return 0
            }

            # Guard: must be a JSON array (rate-limit / error returns an object)
            if ! echo "$response" | jq -e 'type == "array"' > /dev/null 2>&1; then
              local msg
              msg=$(echo "$response" | jq -r '.message // "unknown error"' 2>/dev/null || echo "non-JSON response")
              echo "::warning::GitHub API returned non-array for ${repo}: ${msg}" >&2
              echo ""
              return 0
            }

            echo "$response" | jq -r "map(select(
                .prerelease==false and
                .draft==false and
                # BLOCKLIST: known non-stable keywords in tag name
                (.tag_name | test(\"(?i)(alpha|beta|rc|rh|test|dev|nightly|pre[.-]|snapshot|preview|unstable|canary|experimental)\") | not) and
                # ALLOWLIST: tag must be clean semver or date-based version ONLY
                # Accepts: v1.2.3  1.2.3  2024.06.01  v2024.06.01  (no suffixes allowed)
                (.tag_name | test(\"^v?\\\\d+([.-]\\\\d+)*$\"))
              )) | .[0].${field} // \"\""
          }

          # ── Pi-hole ───────────────────────────────────────────────────────────────
          PI_VERSION=$(fetch_release "pi-hole/docker-pi-hole" "tag_name")
          PI_DATE=$(fetch_release    "pi-hole/docker-pi-hole" "published_at")

          # ── Unbound ───────────────────────────────────────────────────────────────
          UNBOUND_VERSION=$(fetch_release "NLnetLabs/unbound" "tag_name")
          UNBOUND_DATE=$(fetch_release    "NLnetLabs/unbound" "published_at")

          echo "Pi-hole latest : ${PI_VERSION:-<unknown>} (${PI_DATE:-?})"
          echo "Unbound latest : ${UNBOUND_VERSION:-<unknown>} (${UNBOUND_DATE:-?})"

          # ── Bail out gracefully if we couldn't resolve versions ───────────────────
          if [ -z "$PI_VERSION" ] || [ -z "$UNBOUND_VERSION" ]; then
            echo "::warning::One or more versions could not be resolved; skipping update."
            echo "latest_pi=${PI_VERSION:-unknown}"     >> "$GITHUB_OUTPUT"
            echo "latest_unbound=${UNBOUND_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
            echo "stable=false"                         >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_EPOCH=$(date -u +%s)

          # ── 3-Day Stability Buffer (259200 seconds) ───────────────────────────────
          THRESHOLD=259200

          PI_EPOCH=$(date -d "$PI_DATE" +%s 2>/dev/null || echo 0)
          UNBOUND_EPOCH=$(date -d "$UNBOUND_DATE" +%s 2>/dev/null || echo 0)

          PI_AGE=$(( CURRENT_EPOCH - PI_EPOCH ))
          UNBOUND_AGE=$(( CURRENT_EPOCH - UNBOUND_EPOCH ))

          echo "Pi-hole age    : ${PI_AGE}s (threshold ${THRESHOLD}s)"
          echo "Unbound age    : ${UNBOUND_AGE}s (threshold ${THRESHOLD}s)"

          echo "latest_pi=$PI_VERSION"         >> "$GITHUB_OUTPUT"
          echo "latest_unbound=$UNBOUND_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$PI_AGE" -gt "$THRESHOLD" ] || [ "$UNBOUND_AGE" -gt "$THRESHOLD" ]; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Version File
        if: steps.check.outputs.stable == 'true'
        run: |
          echo "PIHOLE_VERSION=${{ steps.check.outputs.latest_pi }}" > VERSION
          echo "UNBOUND_VERSION=${{ steps.check.outputs.latest_unbound }}" >> VERSION
          
          if git diff --quiet; then
            echo "No new stable versions found."
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add VERSION
            git commit -m "chore: update upstream versions to Pi-hole ${{ steps.check.outputs.latest_pi }} and Unbound ${{ steps.check.outputs.latest_unbound }}"
            git push
          fi
