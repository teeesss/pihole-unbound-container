name: Build and Publish

on:
  push:
    tags:
      - '20*'
  workflow_dispatch: # Allow manual build
  workflow_call:     # Allow reusable workflow calls

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Version
        id: get_version
        run: |
          PI_VER=$(grep PIHOLE_VERSION VERSION | cut -d'=' -f2 || echo "latest")
          UNBOUND_VER=$(grep UNBOUND_VERSION VERSION | cut -d'=' -f2 || echo "latest")
          UNBOUND_VER_CLEAN=$(echo "$UNBOUND_VER" | sed 's/^release-//')
          echo "PIHOLE_VERSION=$PI_VER" >> $GITHUB_OUTPUT
          echo "UNBOUND_VERSION=$UNBOUND_VER" >> $GITHUB_OUTPUT
          echo "UNBOUND_VERSION_CLEAN=$UNBOUND_VER_CLEAN" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ steps.get_version.outputs.PIHOLE_VERSION }}-${{ steps.get_version.outputs.UNBOUND_VERSION_CLEAN }}
            type=raw,value=${{ steps.get_version.outputs.PIHOLE_VERSION }}

      - name: Build Local Test Image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          load: true
          build-args: |
            PIHOLE_VERSION=${{ steps.get_version.outputs.PIHOLE_VERSION }}
            UNBOUND_VERSION=${{ steps.get_version.outputs.UNBOUND_VERSION }}
          tags: pihole-unbound:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Integration Tests
        run: |
          docker run -d --name pihole-test -p 8088:80 -p 5335:5335/udp -e FTLCONF_dns_upstreams="127.0.0.1#5335" pihole-unbound:test
          
          echo "Waiting for Pi-hole and Unbound to start..."
          success=false
          for i in {1..15}; do
            if docker exec pihole-test unbound-checkconf /etc/unbound/unbound.conf && \
               docker exec pihole-test unbound -V && \
               docker exec pihole-test nslookup -port=5335 google.com 127.0.0.1 >/dev/null 2>&1 && \
               docker exec pihole-test nslookup google.com 127.0.0.1 >/dev/null 2>&1; then
              echo "Pi-hole and Unbound integration check passed!"
              success=true
              break
            fi
            sleep 2
          done
          
          docker stop pihole-test || true
          docker rm pihole-test || true
          
          if [ "$success" = "false" ]; then
            echo "Error: Pi-hole & Unbound compatibility check failed!"
            exit 1
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          build-args: |
            PIHOLE_VERSION=${{ steps.get_version.outputs.PIHOLE_VERSION }}
            UNBOUND_VERSION=${{ steps.get_version.outputs.UNBOUND_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
